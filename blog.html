<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/webp" href="assets/img/favicon.webp">

    <!-- SEO Base (Fallback) -->
    <title>Análisis Institucional | Luxus Consultores</title>
    <meta name="description" content="Lecturas estratégicas sobre comunicación corporativa, reputación y gestión de crisis para tomar mejores decisiones públicas.">
    <link rel="canonical" href="https://www.luxusconsultores.com/blog.html">

    <!-- Open Graph (Fallback) -->
    <meta property="og:title" content="Análisis Institucional | Luxus Consultores">
    <meta property="og:description" content="Lecturas sobre comunicación corporativa, reputación y gestión de activos intangibles.">
    <meta property="og:image" content="https://www.luxusconsultores.com/assets/img/og-image.webp">
    <meta property="og:type" content="website">
    <link rel="preload" href="assets/img/blog-hero.webp" as="image" type="image/webp" fetchpriority="high">

    <!-- Preconexiones y Estilos -->
    <link rel="preload" href="assets/fonts/inter-v12-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="assets/fonts/poppins-v20-latin-500.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="assets/css/main.css">

</head>
<body class="antialiased bg-radial-gradient min-h-screen flex flex-col" style="--atmosphere-color: var(--color-luxus-blue); --atmosphere-color-alt: var(--color-luxus-purple);">

    <include src="assets/partials/navigation-section.html"></include>

    <main id="main-content">
        <!-- HERO BLOG UNIFICADO -->
         <section id="hero" class="luxus-hero">
            <div aria-hidden="true" class="luxus-hero-blob"><div></div></div>
            
            <div class="section-container relative z-10">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:items-center">
                    <div class="reveal order-2 lg:order-1">
                        <div class="pill-kicker mb-6">
                            <span class="text-[13px] text-luxus-blue font-bold uppercase tracking-widest">Estrategia de Autoridad</span>
                        </div>
                        <h1 class="hero-title text-balance">
                            Comunicación con <span class="text-accent-luxus-blue">criterio estratégico</span>
                        </h1>
                        <p class="section-description mb-10 text-slate-300 max-w-xl">
                            Transformamos la complejidad en mensajes claros para organizaciones que buscan excelencia, reputación y vínculos sólidos.
                        </p>
                        <div class="reveal d2 flex flex-wrap gap-4 mt-8">
                        <a href="contacto.html" class="btn-primary w-full md:w-auto">Solicitar una reunión</a>
                        <a href="servicios.html" class="btn-secondary w-full md:w-auto">Conocer servicios</a>
                    </div>
                </div>
                    <div class="reveal d2 order-1 lg:order-2 flex justify-center lg:block lg:mt-0">
                        <div class="hero-mask-visual">
                            <img src="assets/img/comunicacion-institucional.webp" alt="Estrategia Luxus" class="img-grayscale-reveal" loading="eager" fetchpriority="high">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section-standard relative isolate">
            <div class="section-container">
                <!-- Atmosphere Glow interno para la rejilla -->
                <div class="aric absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-luxus-purple/5 rounded-full pointer-events-none -z-10 blur-3xl"></div>

                <!--<header class="blog-toolbar mb-12 reveal">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                        <div>
                            <span class="section-kicker text-luxus-purple">Archivo editorial</span>
                            <h2 class="mt-3 text-2xl font-bold text-white">Seleccione un eje de análisis.</h2>
                            <p class="body-small mt-3 max-w-xl">Artículos pensados para leer rápido, decidir mejor y llevar criterio a conversaciones complejas.</p>
                        </div>
                        <div id="category-filters" class="flex flex-wrap gap-3"></div>
                    </div>
                </header>-->

                <!-- Contenedor del Blog con Bento Grid -->
                <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 auto-rows-[minmax(250px,auto)] reveal d1">
                    <div class="luxus-card skeleton lg:col-span-2 lg:row-span-2 aspect-4/5 lg:aspect-square rounded-large!"></div>
                    <div class="luxus-card skeleton aspect-video md:aspect-auto rounded-large!"></div>
                    <div class="luxus-card skeleton aspect-video md:aspect-auto rounded-large!"></div>
                    <div class="luxus-card skeleton lg:col-span-2 aspect-21/9 rounded-large!"></div>
                    <div class="luxus-card skeleton aspect-video md:aspect-auto rounded-large!"></div>
                    <div class="luxus-card skeleton aspect-video md:aspect-auto rounded-large!"></div>
                    
                    <div class="col-span-full py-16 text-center">
                        <span class="text-micro text-slate-600 uppercase tracking-[0.3em] animate-pulse">Sincronizando inteligencia...</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN DE CIERRE Y PREGUNTAS -->
        <section class="relative isolate overflow-hidden">
            <div class="aric animate-aric-float absolute -bottom-32 -right-32 w-lg h-128 bg-luxus-purple/10 rounded-full pointer-events-none -z-10"></div>
            <include src="assets/partials/faq-section.html"></include>
        </section>
    </main>
    
    <include src="assets/partials/footer-section.html"></include>

    <script src="assets/js/scripts.js" type="module"></script>
</body>
</html>
