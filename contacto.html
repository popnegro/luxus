<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Luxus Consultores</title>
    <meta name="description" content="Inicie una conversación estratégica. Estamos listos para potenciar la autoridad y reputación de su organización.">
    <link rel="canonical" href="https://www.luxusconsultores.com/contacto.html">
    <link rel="icon" type="image/webp" href="assets/img/favicon.webp">

    <!-- Open Graph -->
    <meta property="og:title" content="Contacto | Luxus Consultores">
    <meta property="og:description" content="Solicite un diagnóstico estratégico para ordenar mensajes, riesgos y próximos pasos de comunicación.">
    <meta property="og:image" content="https://www.luxusconsultores.com/assets/img/og-image.webp">
    <meta property="og:type" content="website">
    <link rel="preload" href="assets/img/relacion-medios.webp" as="image" type="image/webp" fetchpriority="high">

    <!-- Preconexiones y Estilos -->
    <!-- Carga de fuentes asíncrona desde Google Fonts (Core Web Vitals Best Practice) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Poppins:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Poppins:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Poppins:wght@500;600;700&display=swap">
    </noscript>
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body class="antialiased bg-radial-gradient min-h-screen flex flex-col" style="--atmosphere-color: var(--color-luxus-blue); --atmosphere-color-alt: var(--color-luxus-purple);">
    
    <include src="assets/partials/navigation-section.html"></include>

    <main id="main-content" class="grow">
        
        <!-- HERO CONTACTO -->
        <section id="hero" class="luxus-hero">
            <div aria-hidden="true" class="luxus-hero-blob"><div></div></div>
            
            <div class="section-container relative z-10">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:items-center">
                    <div class="reveal order-2 lg:order-1">
                        <div class="pill-kicker mb-6">
                            <span class="text-[13px] text-luxus-blue font-bold uppercase tracking-widest">Contacto Directo</span>
                        </div>
                        <h1 class="hero-title text-balance">
                            Inicie una <span class="text-accent-luxus-blue">conversación estratégica</span>
                        </h1>
                        <p class="section-description mb-10 text-slate-300 max-w-xl">
                            Estamos listos para potenciar la autoridad y reputación de su organización con criterio y resultados tangibles.
                        </p>
                    </div>
                    <div class="reveal d2 order-1 lg:order-2 flex justify-center lg:block lg:mt-0">
                        <div class="hero-mask-visual">
                            <img src="assets/img/relacion-medios.webp" alt="Contacto Luxus" class="img-grayscale-reveal" loading="eager" fetchpriority="high">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN FORMULARIO + INFO -->
        <section class="section-standard relative isolate">
            <div class="section-container">
                <div class="grid grid-cols-1 items-start gap-12 lg:grid-cols-3 lg:gap-12">
                    
                    <!-- COLUMNA INFO (4 cols) -->
                    <div class="reveal space-y-10 lg:col-span-1 lg:space-y-12">
                        <div class="space-y-10">
                            <h2 class="text-micro font-bold uppercase text-luxus-blue tracking-[0.25em]">Canales de Coordinación</h2>
                            <div class="space-y-6">
                                <div class="group cursor-default">
                                    <p class="text-tiny font-bold text-slate-600 uppercase mb-2">Asesoría Directa</p>
                                    <a href="mailto:info@luxusconsultores.com" class="email-load text-lg font-medium text-white hover:text-luxus-blue transition-colors">info@luxusconsultores.com</a>
                                </div>
                                <div class="group cursor-default">
                                    <p class="text-tiny font-bold text-slate-600 uppercase mb-1">Alcance Regional</p>
                                    <address class="not-italic text-lg font-medium text-white">Mendoza, Argentina <br> <span class="text-slate-500 font-normal">Alcance Regional / Latam</span></address>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- COLUMNA FORMULARIO (8 cols) -->
                    <div class="reveal d1 lg:col-span-2">
                        <div class="embedded-form-slot">
                            <include src="assets/partials/form-section.html"></include>
                        </div>
                    </div>

                </div>
            </div>
        </section>

    </main>

    <include src="assets/partials/footer-section.html"></include>

    <script src="assets/js/scripts.js" type="module"></script>
</body>
</html>
